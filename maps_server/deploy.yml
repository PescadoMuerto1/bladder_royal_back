---
- name: Deploy Maps Server (TileServer GL)
  hosts: all
  become: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0777'

    - name: Copy docker-compose.yml to the remote server
      ansible.builtin.copy:
        src: ./docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        mode: '0644'

    - name: Ensure Docker and Docker Compose are installed and running
      # Assuming docker and docker compose plugin are already installed on the target machine
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Start the Docker Compose stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ app_dir }}"
      register: docker_compose_output
      changed_when: "'Created' in docker_compose_output.stdout or 'Started' in docker_compose_output.stdout"

    - name: Show Docker Compose Output
      ansible.builtin.debug:
        var: docker_compose_output.stdout_lines
