services:
  back:
    container_name: bladder-royal-back-container
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./server.env
    environment:
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-service-account.json
    ports:
      - "127.0.0.1:3030:3030"
    volumes:
      - ./config/firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3030/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
